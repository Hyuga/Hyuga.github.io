<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akiharu Hyuga — Apps</title>
  <meta name="description" content="Akiharu Hyugaのゲームアプリ一覧">
  <meta property="og:title"       content="Akiharu Hyuga — Apps">
  <meta property="og:description" content="Akiharu Hyugaのゲームアプリ一覧">
  <meta property="og:image"       content="https://hyuga.github.io/assets/app_icon.png">
  <meta property="og:url"         content="https://hyuga.github.io/">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:    #fef6f2;
      --rose:     #f0a0b8;
      --plum:     #6a4070;
      --gold:     #f5c860;
      --text-dk:  #3a2040;
      --text-md:  #8a6090;
      --text-lt:  #c0a0c8;
      --card-bg:  rgba(255,255,255,.88);
      --card-bd:  rgba(240,160,184,.3);
      --fs-hero:  clamp(1.8rem, 5vw, 2.8rem);
      --fs-body:  clamp(0.95rem, 2vw, 1.1rem);
      --fs-small: clamp(0.85rem, 1.8vw, 1rem);
      --fs-btn:   clamp(0.95rem, 2vw, 1.05rem);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: var(--cream);
      color: var(--text-dk);
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 10%, #ffe4f4cc 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 15%, #ead8ffaa 0%, transparent 50%),
        radial-gradient(ellipse 70% 60% at 60% 90%, #ffd8c8aa 0%, transparent 55%),
        #fef6f2;
    }

    /* ── Sparkles ── */
    .sparkles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .sp {
      position: absolute; color: var(--cl, #f5c860);
      font-size: var(--sz, 12px);
      animation: sp-rise var(--dur, 7s) ease-in-out infinite var(--del, 0s);
      opacity: 0;
    }
    @keyframes sp-rise {
      0%   { opacity:0;  transform:translateY(0) scale(.7); }
      30%  { opacity:.8; }
      70%  { opacity:.3; }
      100% { opacity:0;  transform:translateY(-70px) scale(1.3); }
    }

    /* ── Paw decorations ── */
    .paws { position: fixed; inset:0; z-index:1; pointer-events:none; }
    .paw  { position: absolute; font-size: var(--sz,1.2em); opacity: var(--op,.1); transform: rotate(var(--r,0deg)); }

    /* ── Main ── */
    .main {
      position: relative; z-index: 2; flex: 1;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 56px 24px 48px;
      max-width: 640px; margin: 0 auto; width: 100%;
    }

    /* ── Milk hero ── */
    .milk-wrap { position: relative; margin-bottom: 12px; }
    .milk-halo {
      position: absolute; width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,160,184,.35) 0%, transparent 70%);
      top:50%; left:50%; transform: translate(-50%,-50%);
      animation: halo 3.5s ease-in-out infinite;
    }
    @keyframes halo {
      0%,100% { transform:translate(-50%,-50%) scale(1);   opacity:.5; }
      50%      { transform:translate(-50%,-50%) scale(1.2); opacity:1;  }
    }
    .milk-img {
      width: 160px; height: 160px; object-fit: contain;
      position: relative; z-index:1;
      filter: drop-shadow(0 16px 32px rgba(200,100,140,.3));
      animation: bob 4s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform:translateY(0) rotate(-2deg); }
      50%      { transform:translateY(-16px) rotate(2deg); }
    }

    /* ── Developer title ── */
    .dev-name {
      font-family: 'Klee One', cursive;
      font-size: var(--fs-hero); color: var(--plum);
      letter-spacing: .04em; text-align: center;
    }
    .dev-sub {
      font-size: var(--fs-small); color: var(--text-lt);
      letter-spacing: .22em; margin-top: 6px; margin-bottom: 36px;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; width: 100%;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px;
    }
    .divider::before { background: linear-gradient(to right, transparent, var(--rose)); }
    .divider::after  { background: linear-gradient(to left,  transparent, var(--rose)); }
    .divider span {
      font-family:'Klee One',cursive;
      font-size: var(--fs-small); color: var(--text-lt);
      letter-spacing:.22em; white-space:nowrap;
    }

    /* ── App showcase cards ── */
    .apps { width: 100%; display: flex; flex-direction: column; gap: 20px; }

    .app-card {
      display: block; text-decoration: none; color: inherit;
      background: var(--card-bg);
      border: 1.5px solid var(--card-bd);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(18px);
      box-shadow: 0 6px 28px rgba(200,140,180,.12);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s, border-color .3s;
    }
    .app-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(240,160,184,.55);
      box-shadow: 0 18px 48px rgba(200,140,180,.22);
    }

    /* feature_graphic banner inside card */
    .card-banner {
      width: 100%; aspect-ratio: 1024/500;
      overflow: hidden;
    }
    .card-banner img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }
    .app-card:hover .card-banner img { transform: scale(1.03); }

    /* card body */
    .card-body {
      padding: 18px 20px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .app-icon {
      width: 60px; height: 60px;
      border-radius: 14px; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(200,140,180,.24);
    }
    .card-info { flex: 1; }
    .card-info h2 {
      font-family: 'Klee One', cursive;
      font-size: var(--fs-body); color: var(--plum);
      margin-bottom: 4px; line-height: 1.35;
    }
    .card-info p {
      font-size: var(--fs-small); color: var(--text-lt); line-height: 1.5;
    }
    .card-cta {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      background: var(--rose); color: #fff;
      font-family: 'Klee One', cursive;
      font-size: var(--fs-btn); font-weight: 600;
      padding: 10px 18px; border-radius: 14px;
      box-shadow: 0 4px 16px rgba(240,160,184,.45);
      transition: box-shadow .2s, transform .2s;
      white-space: nowrap;
    }
    .app-card:hover .card-cta {
      box-shadow: 0 8px 24px rgba(240,160,184,.55);
      transform: scale(1.04);
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 2;
      text-align: center; padding: 28px 24px;
      color: var(--text-lt); font-size: var(--fs-small);
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="sparkles" id="sp"></div>
<div class="paws">
  <span class="paw" aria-hidden="true" style="top:8%;  left:5%;  --r:22deg;  --sz:1.5em; --op:.09">🐾</span>
  <span class="paw" aria-hidden="true" style="top:28%; right:6%; --r:-18deg; --sz:1.1em; --op:.08">🐾</span>
  <span class="paw" aria-hidden="true" style="top:62%; left:7%;  --r:30deg;  --sz:1em;   --op:.08">🐾</span>
  <span class="paw" aria-hidden="true" style="top:80%; right:5%; --r:-25deg; --sz:1.3em; --op:.09">🐾</span>
</div>

<div class="main">
  <div class="milk-wrap">
    <div class="milk-halo"></div>
    <img src="assets/milk_happy.png" alt="ミルク" class="milk-img">
  </div>

  <h1 class="dev-name">Akiharu Hyuga</h1>
  <p class="dev-sub">✦ Game Developer ✦</p>

  <div class="divider"><span>APPS</span></div>

  <div class="apps">
    <a href="nyanko/" class="app-card">
      <div class="card-banner">
        <img src="assets/feature_graphic.png" alt="もふふミルクとにゃんこ脱出ゲーム">
      </div>
      <div class="card-body">
        <img src="assets/app_icon.png" alt="アイコン" class="app-icon">
        <div class="card-info">
          <h2>もふふミルクとにゃんこ脱出ゲーム</h2>
          <p>ふわふわ島の謎を解いて、ミルクと一緒に脱出しよう</p>
        </div>
        <span class="card-cta">▶ 詳しく</span>
      </div>
    </a>
  </div>
</div>

<footer>© 2026 Akiharu Hyuga</footer>

<script>
  const sp = document.getElementById('sp');
  const syms   = ['✦','✧','⋆','·','✿','♡'];
  const colors = ['#f5c860','#f0a0b8','#d4c5f0','#ffd0b8'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'sp';
    el.textContent = syms[Math.floor(Math.random()*syms.length)];
    el.style.left = Math.random()*100+'%';
    el.style.top  = (5+Math.random()*85)+'%';
    el.style.setProperty('--sz',  (10+Math.random()*10)+'px');
    el.style.setProperty('--dur', (5+Math.random()*7)+'s');
    el.style.setProperty('--del', (Math.random()*9)+'s');
    el.style.setProperty('--cl',  colors[Math.floor(Math.random()*colors.length)]);
    sp.appendChild(el);
  }
</script>
</body>
</html>
